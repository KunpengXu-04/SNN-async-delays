protocol_id: simultaneous_output_interface_calibration_v1
status: stopped_structural_invalidity
purpose: >
  Freeze one opponent-output LIF threshold without using WAD outcomes. The
  screen uses d0 only and covers both spatial-pair and shared-windowed outputs.
thresholds: [0.2, 0.3, 0.5]
seeds: [0, 1, 42]
interfaces: [spatial, temporal]
condition: d0
frozen_hidden_config:
  threshold: 0.3
  d_max: 30
  lr_d: 0.001
  delay_init_mode: constant
  optimization_schedule: joint
selection_rule: >
  A threshold is viable only if both interfaces have finite metrics, mean
  worst balanced accuracy in [0.50,0.95], mean silent rate <0.50, mean tie rate
  <0.50 and mean collision rate <0.25. Among viable thresholds select the one
  whose mean output spikes per operation/window is closest to 1. Accuracy is a
  gate and not the tie-breaker. If none is viable, do not launch either pilot.
test_split_opened: false
postlaunch_amendment:
  date: 2026-07-13
  completed_spatial_cells: 9
  completed_temporal_cells: 6
  decision: no_threshold_selected
  reason: >
    Every completed temporal d0 cell had constant BCE log(2), 100% silent and
    tie rates, and zero output spikes. Fixed diagnostic samples placed every
    hidden spike in the 0-10 input interval and none in the three post-input
    output windows. D0 therefore cannot serve as a temporal-output excitability
    calibration for this feedforward architecture. Remaining cells were
    stopped to avoid treating structural silence as a threshold comparison.
