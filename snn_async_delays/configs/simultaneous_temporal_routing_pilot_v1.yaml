protocol_id: simultaneous_temporal_routing_pilot_v1
status: locked_pending_counterbalanced_protocol_amendment_after_v2_pass
purpose: >
  True temporal-routing pilot: simultaneous mixed-operation inputs must be
  decoded in ordered output windows using shared readout parameters or one
  shared opponent output pair.
query_ops: [XOR, NAND, NOR]
K: 3
input_schedule: simultaneous
input_win: 10
output_window_len: 10
read_len: 30
hidden_size: 50
seeds: [0, 1, 42]
conditions: [d0, scalar, fixed_matched, w_and_d]
endpoints: [shared_linear, shared_mlp, opponent_shared_windowed]
frozen_wad_config:
  threshold: 0.3
  d_max: 30
  lr_d: 0.001
  delay_init_mode: constant
  optimization_schedule: joint
frozen_output_threshold: 0.2
fixed_matched_delay_range: [1.0, 9.0]
encoding:
  mode: burst
  n_spikes_on: 2
  n_spikes_off: 1
  phase_on: 0.20
  phase_off: 0.80
  jitter_ms: 0
training:
  epochs: 100
  n_train: 2000
  n_val: 500
  batch_size: 128
  lr_w: 0.001
  lr_readout: 0.001
  output_threshold: null
primary_metric: worst_query_balanced_accuracy
secondary_metrics: [exact_trial_accuracy, routing_selectivity_gap, output_window_collision_rate, resource_ledger]
required_evaluation:
  - exhaustive_64_pattern_truth_table
  - per_window_accuracy
  - per_window_balanced_accuracy
  - worst_window_balanced_accuracy
  - exact_trial_accuracy
  - routing_selectivity_matrix
  - output_silent_tie_collision_rates
  - per_window_temporal_margin
  - per_window_output_spikes
  - resource_ledger
rules:
  - Validation only; test is sealed.
  - shared_linear/shared_mlp reuse one decoder across all output windows.
  - opponent_shared_windowed reuses one class-0/class-1 neuron pair across windows.
  - Logit per window is count(class1)-count(class0).
  - All-time and time-binned decoders are diagnostics only, not primary evidence.
  - Pooled accuracy is descriptive only; window-balanced reliability is primary.
  - Output threshold 0.2 is frozen from calibration v2 and must not be retuned.
  - Do not launch the 36-cell matrix until a versioned, outcome-independent viability preflight verifies matched opponent-output training across delay conditions.
