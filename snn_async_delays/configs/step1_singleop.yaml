# ============================================================
# Step 1 - Single-op solvability baseline
# ============================================================

# ----- Simulation timing -----
dt: 1.0
win_len: 40
read_len: 10
gap_len: 0
# Total trial length = 50 ms

# ----- Network -----
n_input: 2
hidden_size: 50
d_max: 49
lif_tau_m: 10.0
lif_threshold: 1.0
lif_reset: 0.0
lif_refractory: 2
surrogate_beta: 4.0
delay_param_type: sigmoid      # sigmoid | direct | quantized
delay_step: 1.0                # used when delay_param_type=quantized
weights_only_fixed_delay: 0.0  # explicit synchronous baseline
fixed_delay_value: null        # optional global fixed delay override
use_output_layer: false
readout_source: hidden

# ----- Training -----
train_mode: weights_and_delays  # weights_only | delays_only | weights_and_delays
lr_w: 1.0e-3
lr_d: 1.0e-3
lr_readout: 1.0e-3
batch_size: 256
epochs: 200
spike_penalty: 0.0
delay_penalty: 0.0
grad_clip: 1.0

# ----- Rate coding -----
r_on: 400.0
r_off: 10.0

# ----- Dataset -----
ops_list: [AND, OR, XOR, XNOR, NAND, NOR, A_IMP_B, B_IMP_A]
op_name: NAND
n_train: 4000
n_val: 1000
n_test: 1000
seed: 42

# ----- Sweep configuration -----
sweep:
  ops: [AND, OR, XOR, XNOR, NAND, NOR, A_IMP_B, B_IMP_A]
  train_modes: [weights_only, delays_only, weights_and_delays]
  hidden_sizes: [10, 20, 50]
  seeds: [42]
