# NAND K=1, Plan D timing, spiking output layer (use_output_spikes=true)
# Purpose: diagnostic visualization — does the LIF output layer fire meaningfully?
# Compare with standard linear readout to see output spike trains in raster.

dt: 1.0
sub_win: 10
read_len: 10

n_ops: 0          # single-op mode
ops_list: [NAND]
same_op: true

n_hidden: 50
lif_tau_m: 10.0
lif_threshold: 1.0
lif_reset: 0.0
lif_refractory: 2
surrogate_beta: 4.0
delay_param_type: sigmoid
delay_step: 1.0

lr_w: 1.0e-3
lr_d: 1.0e-3
lr_readout: 0.0    # no readout module when use_output_spikes=true
batch_size: 128
epochs: 200
spike_penalty: 0.0
delay_penalty: 0.0
grad_clip: 1.0

r_on: 400.0
r_off: 10.0

n_train: 4000
n_val:   500
n_test:  500
seed: 42

sweep:
  K_values: [1]
  seeds: [42]
  accuracy_thresholds: [0.95, 0.90]

  models:
    - name: spiking_out_wad
      train_mode: weights_and_delays
      fixed_delay_value: null
      readout_type: linear       # overridden by use_output_spikes
      use_output_spikes: true
      n_output_neurons: 1
      num_hidden_layers: 1
      hidden_sizes: [50]

    - name: spiking_out_d0
      train_mode: weights_only
      fixed_delay_value: 0.0
      readout_type: linear
      use_output_spikes: true
      n_output_neurons: 1
      num_hidden_layers: 1
      hidden_sizes: [50]
