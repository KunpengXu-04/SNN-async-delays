# ============================================================
# Step 3 Follow-Up — 4 Easy Ops (AND, OR, NAND, NOR)
#
# Motivation:
#   Step 3 8-op baseline failed to reach Max K@90%=1 because two
#   compounding factors dragged accuracy below 90%:
#     (1) Data sparsity: n_train=4000 / 8 ops = ~500 pairs/op at K=1
#         (vs 4000/op for NAND in Step 2)
#     (2) Hard-op drag: XOR/XNOR require nonlinear computation; even
#         4000 samples only reaches 93% in Step 1 at h=50.
#
# This config removes both obstacles simultaneously:
#   - n_ops=4 removes XOR/XNOR and A_IMP_B/B_IMP_A
#   - same n_train=4000 now yields ~1000 pairs/op (doubled)
#   - n_input drops from 10 to 6 (2 A/B + 4 one-hot)
#   - zero extra compute (~2-3 hours, same 16 runs)
#
# Hypothesis:
#   K=1 w_and_d reaches ≥90%; delay advantage (+10-20%) persists;
#   Max K@90% recovers to ≥1, confirming Step 2 generalises to mixed
#   ops when the task is tractable.
# ============================================================

# ----- Fixed timing (same as Step 2 Plan D baseline) -----
dt: 1.0
sub_win: 10
read_len: 10

# ----- Op config -----
n_ops: 4
ops_list: [AND, OR, NAND, NOR]
same_op: false
op_sampling: uniform

# ----- Network defaults -----
n_hidden: 50
lif_tau_m: 10.0
lif_threshold: 1.0
lif_reset: 0.0
lif_refractory: 2
surrogate_beta: 4.0
delay_param_type: sigmoid
delay_step: 1.0

# ----- Training -----
lr_w: 1.0e-3
lr_d: 1.0e-3
lr_readout: 1.0e-3
batch_size: 128
epochs: 200
spike_penalty: 0.0
delay_penalty: 0.0
grad_clip: 1.0

# ----- Rate coding -----
r_on: 400.0
r_off: 10.0

# ----- Dataset -----
n_train: 4000
n_val: 1000
n_test: 1000
seed: 42

# ----- Sweep -----
sweep:
  K_values: [1, 2, 3, 4]
  seeds: [42, 0]
  accuracy_thresholds: [0.95, 0.90]

  models:
    - name: w_and_d
      train_mode: weights_and_delays
      fixed_delay_value: null
      readout_type: mlp
      num_hidden_layers: 1
      hidden_sizes: [50]

    - name: d0_control
      train_mode: weights_only
      fixed_delay_value: 0.0
      readout_type: mlp
      num_hidden_layers: 1
      hidden_sizes: [50]
