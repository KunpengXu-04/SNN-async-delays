# Conda environment for the SNN async-delays project
#
# Create:
#   conda env create -f environment.yaml
# Activate:
#   conda activate snn_async
#
# GPU note: replace 'cpuonly' with 'pytorch-cuda=12.1' (or match your CUDA version)
# for GPU support. See https://pytorch.org/get-started/locally/

name: snn_async

channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # ---- PyTorch (GPU build) ----
  - pytorch
  - torchvision
  - pytorch-cuda=12.1

  # ---- Scientific stack ----
  - numpy>=1.24
  - matplotlib>=3.7
  - pandas>=2.0

  # ---- Utilities ----
  - pyyaml>=6.0
  - tqdm>=4.65